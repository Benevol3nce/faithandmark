<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP - Faith & Mark</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
      <!-- Navigation links here -->
    </nav>

    <main>
        <h1>RSVP</h1>
        <p>Please let us know if you can make it by October 7, 2026.</p>
        
        <form action="YOUR_FORMSPREE_ENDPOINT" method="POST" class="rsvp-form">
            <div class="form-group">
                <label for="name">Full Name(s):</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="attending">Will you be attending?</label>
                <select id="attending" name="attending" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="Joyfully accept">Joyfully accept</option>
                    <option value="Regretfully decline">Regretfully decline</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dietary">Dietary Requirements:</label>
                <textarea id="dietary" name="dietary" rows="3" placeholder="Let us know about any allergies or dietary needs"></textarea>
            </div>

            <button type="submit">Send RSVP</button>
        </form>
    </main>
</body>
</html>
